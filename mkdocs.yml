site_name: relfair
site_description: Relationship-aware counterfactual fairness testing
site_author: Archit Rathod
site_url: https://archit1706.github.io/relfair
repo_name: Archit1706/relfair
repo_url: https://github.com/Archit1706/relfair

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.highlight
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quickstart: quickstart.md
  - User Guide:
    - Counterfactual Engine: guide/counterfactual.md
    - LL 144 Metrics: guide/metrics.md
    - CLI Reference: guide/cli.md
  - API Reference:
    - graph: api/graph.md
    - mechanisms: api/mechanisms.md
    - counterfactual: api/counterfactual.md
    - manifold: api/manifold.md
    - discovery: api/discovery.md
    - metrics: api/metrics.md
    - report: api/report.md
  - Benchmarks: benchmarks.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Archit1706/relfair
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/relfair/
